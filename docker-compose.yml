version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: indexmenow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: indexmenow
      POSTGRES_PASSWORD: indexmenow_secret
      POSTGRES_DB: indexmenow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexmenow -d indexmenow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: indexmenow_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
